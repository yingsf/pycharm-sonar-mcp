name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            os: macos-14
            artifact_name: pycharm-sonar-mcp-macos-arm64
            py_request: "3.12"
            run_arch: ""          # native arm64
          - label: macos-x64
            os: macos-14          # Apple Silicon runner; build x64 via an x86_64 Python
            artifact_name: pycharm-sonar-mcp-macos-x64
            py_request: "cpython-3.12-macos-x86_64-none"
            run_arch: "x86_64"    # smoke-test the x64 binary under Rosetta
          - label: windows-x64
            os: windows-latest
            artifact_name: pycharm-sonar-mcp-windows-x64.exe
            py_request: "3.12"
            run_arch: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # For the macOS x64 build we request an x86_64 CPython from uv and run PyInstaller
      # against it. uv itself keeps running natively on arm64; only the Python it manages
      # (and the binary PyInstaller assembles from it) is x86_64. This avoids the scarce
      # GitHub-hosted Intel macOS runner entirely.
      - name: Set up Python
        run: uv python install "${{ matrix.py_request }}"

      - name: Sync + add pyinstaller
        run: |
          uv sync --python "${{ matrix.py_request }}"
          uv pip install pyinstaller

      - name: Build with PyInstaller
        run: uv run --python "${{ matrix.py_request }}" pyinstaller --noconfirm --clean --distpath pyinstaller/dist pyinstaller/pycharm-sonar-mcp.spec

      - name: Rename binary (POSIX)
        if: runner.os != 'Windows'
        run: mv pyinstaller/dist/pycharm-sonar-mcp pyinstaller/dist/${{ matrix.artifact_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item -Path pyinstaller\dist\pycharm-sonar-mcp.exe -Destination pyinstaller\dist\${{ matrix.artifact_name }} -Force

      - name: Smoke --version (POSIX)
        if: runner.os != 'Windows'
        run: ${{ matrix.run_arch == 'x86_64' && 'arch -x86_64' || '' }} pyinstaller/dist/${{ matrix.artifact_name }} --version

      - name: Smoke --version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\pyinstaller\dist\${{ matrix.artifact_name }} --version

      - name: Smoke doctor (POSIX)
        if: runner.os != 'Windows'
        run: pyinstaller/dist/${{ matrix.artifact_name }} doctor || true

      - name: Smoke doctor (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\pyinstaller\dist\${{ matrix.artifact_name }} doctor
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: pyinstaller/dist/${{ matrix.artifact_name }}

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten + list
        run: |
          mkdir -p staging
          find release-assets -type f -exec cp {} staging/ \;
          # Include install scripts and source archive.
          cp scripts/install-macos.sh staging/
          cp scripts/install-windows.ps1 staging/
          ls -la staging

      - name: Generate SHA256SUMS
        working-directory: staging
        run: |
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          generate_release_notes: true
          files: |
            staging/*
