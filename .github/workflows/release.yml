name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.optional }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            os: macos-14
            artifact_name: pycharm-sonar-mcp-macos-arm64
            optional: false
          # macos-13 (Intel) is heavily rate-limited for free accounts. It is marked
          # optional so a queued/failed Intel build never blocks the release; the arm64
          # and Windows binaries still ship. Re-running the workflow later, once Intel
          # capacity frees up, produces the missing macos-x64 artifact.
          - label: macos-x64
            os: macos-13
            artifact_name: pycharm-sonar-mcp-macos-x64
            optional: true
          - label: windows-x64
            os: windows-latest
            artifact_name: pycharm-sonar-mcp-windows-x64.exe
            optional: false
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync + add pyinstaller
        run: |
          uv sync --python 3.12
          uv pip install pyinstaller

      - name: Build with PyInstaller
        run: uv run pyinstaller --noconfirm --clean --distpath pyinstaller/dist pyinstaller/pycharm-sonar-mcp.spec

      - name: Rename binary (POSIX)
        if: runner.os != 'Windows'
        run: mv pyinstaller/dist/pycharm-sonar-mcp pyinstaller/dist/${{ matrix.artifact_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item -Path pyinstaller\dist\pycharm-sonar-mcp.exe -Destination pyinstaller\dist\${{ matrix.artifact_name }} -Force

      - name: Smoke --version (POSIX)
        if: runner.os != 'Windows'
        run: pyinstaller/dist/${{ matrix.artifact_name }} --version

      - name: Smoke --version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\pyinstaller\dist\${{ matrix.artifact_name }} --version

      - name: Smoke doctor (POSIX)
        if: runner.os != 'Windows'
        run: pyinstaller/dist/${{ matrix.artifact_name }} doctor || true

      - name: Smoke doctor (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\pyinstaller\dist\${{ matrix.artifact_name }} doctor
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: pyinstaller/dist/${{ matrix.artifact_name }}

  release:
    name: publish release
    # Run even if the optional macos-x64 build was skipped/failed, as long as the
    # required builds (arm64 + windows) succeeded. The guard step below aborts the
    # release when a required artifact is missing, so a failed required build still
    # stops a broken release.
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten + verify required artifacts
        run: |
          mkdir -p staging
          find release-assets -type f -exec cp {} staging/ \;
          cp scripts/install-macos.sh staging/
          cp scripts/install-windows.ps1 staging/
          # arm64 and Windows binaries are required; the Intel macos-x64 is optional.
          for required in pycharm-sonar-mcp-macos-arm64 pycharm-sonar-mcp-windows-x64.exe; do
            if [ ! -f "staging/$required" ]; then
              echo "Required artifact missing: $required — aborting release."
              exit 1
            fi
          done
          if [ ! -f staging/pycharm-sonar-mcp-macos-x64 ]; then
            echo "WARNING: Intel macos-x64 artifact missing; release will ship without it."
          fi
          ls -la staging

      - name: Generate SHA256SUMS
        working-directory: staging
        run: |
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          generate_release_notes: true
          files: |
            staging/*
