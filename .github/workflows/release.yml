name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  # Required builds: arm64 + Windows. The release job waits for these only.
  build-required:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            os: macos-14
            artifact_name: pycharm-sonar-mcp-macos-arm64
          - label: windows-x64
            os: windows-latest
            artifact_name: pycharm-sonar-mcp-windows-x64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync + add pyinstaller
        run: |
          uv sync --python 3.12
          uv pip install pyinstaller

      - name: Build with PyInstaller
        run: uv run pyinstaller --noconfirm --clean --distpath pyinstaller/dist pyinstaller/pycharm-sonar-mcp.spec

      - name: Rename binary (POSIX)
        if: runner.os != 'Windows'
        run: mv pyinstaller/dist/pycharm-sonar-mcp pyinstaller/dist/${{ matrix.artifact_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item -Path pyinstaller\dist\pycharm-sonar-mcp.exe -Destination pyinstaller\dist\${{ matrix.artifact_name }} -Force

      - name: Smoke --version (POSIX)
        if: runner.os != 'Windows'
        run: pyinstaller/dist/${{ matrix.artifact_name }} --version

      - name: Smoke --version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\pyinstaller\dist\${{ matrix.artifact_name }} --version

      - name: Smoke doctor (POSIX)
        if: runner.os != 'Windows'
        run: pyinstaller/dist/${{ matrix.artifact_name }} doctor || true

      - name: Smoke doctor (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\pyinstaller\dist\${{ matrix.artifact_name }} doctor
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: pyinstaller/dist/${{ matrix.artifact_name }}

  # Optional Intel build on macos-13. The free-tier Intel runner is heavily rate-limited,
  # so this job frequently queues for a long time. It is intentionally NOT a dependency of
  # the release job: arm64 + Windows ship regardless. When Intel capacity frees up and this
  # job succeeds, re-run the release workflow to attach the Intel artifact.
  build-macos-x64:
    name: build (macos-x64, optional)
    runs-on: macos-13
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync + add pyinstaller
        run: |
          uv sync --python 3.12
          uv pip install pyinstaller

      - name: Build with PyInstaller
        run: uv run pyinstaller --noconfirm --clean --distpath pyinstaller/dist pyinstaller/pycharm-sonar-mcp.spec

      - name: Rename binary
        run: mv pyinstaller/dist/pycharm-sonar-mcp pyinstaller/dist/pycharm-sonar-mcp-macos-x64

      - name: Smoke --version
        run: pyinstaller/dist/pycharm-sonar-mcp-macos-x64 --version

      - name: Smoke doctor
        run: pyinstaller/dist/pycharm-sonar-mcp-macos-x64 doctor || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pycharm-sonar-mcp-macos-x64
          path: pyinstaller/dist/pycharm-sonar-mcp-macos-x64

  release:
    name: publish release
    # Depends only on the required builds. The optional Intel build may still be queued
    # or may have failed; that must not block publishing arm64 + Windows.
    needs: build-required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten + verify required artifacts
        run: |
          mkdir -p staging
          find release-assets -type f -exec cp {} staging/ \;
          cp scripts/install-macos.sh staging/
          cp scripts/install-windows.ps1 staging/
          # arm64 and Windows binaries are required; the Intel macos-x64 is optional.
          for required in pycharm-sonar-mcp-macos-arm64 pycharm-sonar-mcp-windows-x64.exe; do
            if [ ! -f "staging/$required" ]; then
              echo "Required artifact missing: $required — aborting release."
              exit 1
            fi
          done
          if [ ! -f staging/pycharm-sonar-mcp-macos-x64 ]; then
            echo "WARNING: Intel macos-x64 artifact missing; release will ship without it."
          fi
          ls -la staging

      - name: Generate SHA256SUMS
        working-directory: staging
        run: |
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          generate_release_notes: true
          files: |
            staging/*
