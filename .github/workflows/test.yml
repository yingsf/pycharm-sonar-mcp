name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-type-test:
    name: lint & type & test (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Sync dependencies
        run: uv sync --python ${{ matrix.python }}

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest -q

  shell-and-powershell-scripts:
    name: script sanity (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            shell: bash
          - os: windows-latest
            shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck (macOS)
        if: runner.os == 'macOS'
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -e SC1091 -e SC2086
        with:
          severity: warning
          additional_dirs: scripts

      - name: PowerShell script syntax check (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem scripts/*.ps1 | ForEach-Object {
            $errors = $null
            $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw $_.FullName), [ref]$errors)
            if ($errors.Count -gt 0) {
              Write-Host "Errors in $($_.Name):"
              $errors | ForEach-Object { Write-Host "  $($_.Message)" }
              exit 1
            }
            Write-Host "$($_.Name): syntax OK"
          }

  pyinstaller-smoke:
    name: PyInstaller build & smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: pycharm-sonar-mcp-macos-x64
          - os: windows-latest
            artifact_name: pycharm-sonar-mcp-windows-x64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync + add pyinstaller
        run: |
          uv sync --python 3.12
          uv pip install pyinstaller

      - name: Build with PyInstaller
        run: uv run pyinstaller --noconfirm --clean --distpath pyinstaller/dist pyinstaller/pycharm-sonar-mcp.spec

      - name: Smoke --version (POSIX)
        if: runner.os != 'Windows'
        run: ./pyinstaller/dist/pycharm-sonar-mcp --version

      - name: Smoke --version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\pyinstaller\dist\pycharm-sonar-mcp.exe --version

      - name: Smoke doctor (POSIX)
        if: runner.os != 'Windows'
        run: ./pyinstaller/dist/pycharm-sonar-mcp doctor || true

      - name: Smoke doctor (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\pyinstaller\dist\pycharm-sonar-mcp.exe doctor
        continue-on-error: true

      - name: Smoke MCP stdio initialize handshake (POSIX)
        if: runner.os != 'Windows'
        run: |
          resp=$(echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' | ./pyinstaller/dist/pycharm-sonar-mcp serve | head -1)
          echo "Response: $resp"
          echo "$resp" | grep -q '"serverInfo"' || { echo "initialize did not return serverInfo"; exit 1; }

      - name: Smoke MCP stdio initialize handshake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $init = '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}'
          $resp = $init | .\pyinstaller\dist\pycharm-sonar-mcp.exe serve | Select-Object -First 1
          Write-Host "Response: $resp"
          if ($resp -notmatch '"serverInfo"') { throw "initialize did not return serverInfo" }

      - name: Upload binary artifact (POSIX)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: pyinstaller/dist/pycharm-sonar-mcp

      - name: Upload binary artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: pyinstaller/dist/pycharm-sonar-mcp.exe
